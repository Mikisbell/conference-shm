# config/research_lines.yaml — Research Lines & Active Paper Profile
# ==================================================================
# Defines WHAT the stack can produce papers about, and constrains
# the active paper to its quartile specs throughout the pipeline.
#
# USAGE:
#   1. User selects a research line + quartile
#   2. System generates an active_profile (bottom of this file)
#   3. All SDD phases read the active_profile as constraint
#   4. validate_submission.py enforces the profile gates
#
# This file is the SSOT for "what papers can we write?"
# journal_specs.yaml is the SSOT for "what does each quartile require?"
#
# DOMAINS: structural (seismic), water (hydraulics), air (wind/CFD)
# The stack produces papers for ALL civil engineering domains.

# ── Research Lines ──────────────────────────────────────────────────
# Each line defines: domain, topic, available data, stack capabilities,
# and which quartiles are viable given current data maturity.

research_lines:

  # ════════════════════════════════════════════════════════════════
  # DOMAIN: STRUCTURAL (seismic, SHM, digital twins)
  # Solver: OpenSeesPy | Status: Active — full pipeline
  # ════════════════════════════════════════════════════════════════

  shm_digital_twin:
    domain: structural
    name: "SHM + Digital Twin Framework"
    description: "Edge-computed structural health monitoring with cryptographic data integrity and OpenSeesPy digital twin"
    keywords:
      - "structural health monitoring"
      - "digital twin"
      - "edge computing"
      - "cryptographic integrity"
    stack_capabilities:
      - firmware (Nicla + Nano33 + LoRa)
      - kalman_filter
      - guardian_angel
      - openseespy_sdof
      - spectral_engine
      - engram_ledger
    available_data:
      synthetic: true       # cv_results.json, spectral analysis
      field: false           # pending field_data_campaign.md
      laboratory: false
    viable_quartiles:
      conference: true       # synthetic + framework description
      Q4: true               # synthetic validated
      Q3: false              # needs field data (30min+ recording)
      Q2: false              # needs field + lab
      Q1: false              # needs field + lab + 2 structures
    papers_planned:
      - articles/drafts/Q1_roadmap.md
    papers_published: []

  cdw_materials:
