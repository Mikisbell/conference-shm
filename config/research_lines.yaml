# ── Active Paper Profile ────────────────────────────────────────────
# Generated when user selects research_line + quartile.
# This section is OVERWRITTEN each time a new paper starts.
# All SDD phases and validate_submission.py read this as constraint.
#
# IMPORTANT: The agent MUST NOT modify this section manually.
# It is generated by the paper selection step in CLAUDE.md PASO 4.

active_profile:
  status: "none"             # none | active | review | submitted
  domain: ""                 # structural | water | air
  research_line: ""          # key from research_lines above
  quartile: ""               # conference | Q4 | Q3 | Q2 | Q1
  target_journal: ""         # specific journal name
  draft_path: ""             # path to active draft in articles/drafts/
  created: ""                # ISO date

  # ── Constraints (auto-populated from journal_specs.yaml) ──
  # These are the HARD LIMITS for the active paper.
  # The agent reads these before every SDD phase.
  constraints:
    word_count_min: 0
    word_count_max: 0
    refs_min: 0
    refs_max: 0
    figures_min: 0
    figures_max: 0
    tables_min: 0
    tables_max: 0
    required_sections: []
    data_requirements: []
    novelty_gate: false
    comparison_methods: 0
