# Domain Registry — Structural Engineering
# Loaded by: domains/base.py → DomainBackend.load_registry("structural")
# SSOT keys: config/params.yaml → project.domain = "structural"
#
# To add a new domain, copy this file to config/domains/<domain>.yaml
# and implement the backend in domains/<domain>.py (extends DomainBackend).

domain: structural
display_name: "Structural Engineering (SHM / Seismic)"
status: operational  # operational | planned | experimental

# ─── Solver ──────────────────────────────────────────────────────────────────
solver:
  engine: openseespy
  version_check: "python3 -c \"import openseespy.opensees as ops; print(ops.version())\""
  install_cmd: "pip install openseespy"
  backend_module: "domains.structural"
  backend_class: "StructuralBackend"

# ─── Python dependencies ─────────────────────────────────────────────────────
dependencies:
  python:
    - openseespy>=3.4
    - numpy>=1.24
    - scipy>=1.10
    - matplotlib>=3.7
    - pandas>=2.0
    - pyyaml>=6.0
  system: []

# ─── External data sources ───────────────────────────────────────────────────
data_sources:
  seismic_records:
    name: PEER NGA-West2
    url: https://ngawest2.berkeley.edu
    requires_account: true
    local_path: db/excitation/records/
    adapter: local_file
    peer_adapter: src/physics/peer_adapter.py
    format: AT2
  benchmarks:
    - name: LANL SHM dataset
      local_path: db/benchmarks/lanl/
    - name: Z24 Bridge dataset
      local_path: db/benchmarks/z24/
    - name: IASC-ASCE benchmark
      local_path: db/benchmarks/iasc_asce/

# ─── APIs used ───────────────────────────────────────────────────────────────
apis:
  openalex:
    env_var: OPENALEX_API_KEY
    purpose: novelty check, style calibration
    required: false
    demo_value: ""
  semantic_scholar:
    env_var: SEMANTIC_SCHOLAR_API_KEY
    purpose: citation analysis, style calibration
    required: false
    demo_value: ""

# ─── Compute pipeline ────────────────────────────────────────────────────────
compute:
  mode: simulation           # simulation | experiment | hybrid
  c0_check: "python3 src/init_bunker.py"
  c1_gate: "python3 tools/fetch_benchmark.py --verify"
  c2_runner: "src/physics/torture_chamber.py"
  c3_emulator: "tools/arduino_emu.py"
  c4_synthetic: "tools/generate_degradation.py"
  c5_manifest: "python3 tools/generate_compute_manifest.py"
  stats_tool: "python3 tools/compute_statistics.py"

# ─── Emulator modes (for C3) ─────────────────────────────────────────────────
emulator:
  tool: tools/arduino_emu.py
  modes:
    nano33:
      - sano
      - resonance
      - dano_leve
      - dano_critico
      - presa
      - dropout
    nicla:
      - nicla_sano
      - nicla_dano
      - nicla_critico
  hardware_migration: "zero code changes — swap PTY for /dev/ttyUSB0"

# ─── SSOT params namespace ───────────────────────────────────────────────────
params_namespace:
  - structure.*
  - nonlinear.*
  - damping.*
  - material.*
  - acquisition.*
  - firmware.*

# ─── Paper pipeline hooks ────────────────────────────────────────────────────
pipeline:
  narrator_flag: "--domain structural"
  plot_figures_flag: "--domain structural"
  normative_codes:
    - E.030
    - ASCE 7-22
    - Eurocode 8
  minimum_quartile_for_field_data: Q2

  # ── Narrator sections (order matters — IMRaD) ─────────────────────────────
  narrator_sections:
    - id: abstract
      title: "Abstract"
      template: >
        This paper presents a {method} framework for structural health monitoring
        of {structure_type} under seismic excitation. The proposed system integrates
        an OpenSeesPy nonlinear finite element model with edge-IoT sensor acquisition.
        Results demonstrate {key_finding}. The framework achieves {metric} across {n_scenarios} damage scenarios.
    - id: introduction
      title: "Introduction"
      template: >
        Structural health monitoring (SHM) of {structure_type} under seismic loading
        remains a critical challenge. This work addresses the gap in {gap}.
    - id: methodology
      title: "Methodology"
      template: >
        The structural model uses OpenSeesPy with parameters from SSOT (config/params.yaml).
        Excitation: {n_records} PEER NGA-West2 records (RSN: {rsn_list}).
        Damage levels: {damage_levels}. Emulation: Arduino Nano 33 BLE Sense Rev2.
    - id: results
      title: "Results"
      template: >
        Simulation results for {n_runs} runs show {key_metric}: {value} ± {std}.
        Cross-validation (scenario A vs B) confirms {finding}.
        Statistical tests: Mann-Whitney U p={p_value} (α=0.05).
    - id: discussion
      title: "Discussion"
      template: >
        The proposed framework outperforms {baseline} in {metric} by {delta}%.
        Limitations: {limitations}. Future work: {future_work}.

  # ── Figures (generated by plot_figures.py) ────────────────────────────────
  figures:
    - id: fig_01_architecture
      type: architecture_diagram
      title: "System Architecture"
      data_source: config/params.yaml
      required: true
    - id: fig_02_ab_comparison
      type: bar_comparison
      title: "A/B Cross-Validation"
      data_source: data/processed/cv_results.json
      required: true
    - id: fig_03_fragility_curve
      type: fragility_curve
      title: "Fragility Curve"
      data_source: data/processed/cv_results.json
      required: true
    - id: fig_04_sensitivity_tornado
      type: tornado_chart
      title: "Sensitivity Tornado"
      data_source: data/processed/cv_results.json
      required: true
    - id: fig_05_benchmark_comparison
      type: benchmark_comparison
      title: "Benchmark vs Published (Q3+)"
      data_source: data/processed/cv_results.json
      required: false  # required for Q3+

  # ── Statistical tests (run by compute_statistics.py) ─────────────────────
  statistics:
    - mann_whitney_u      # nonparametric — always (no normality assumption)
    - welch_t_test        # parametric comparison A vs B
    - cohens_d            # effect size (Q1/Q2)
    - bootstrap_ci_95     # confidence intervals for error bars

  # ── Bibliography categories (used by generate_bibtex.py) ─────────────────
  bib_categories:
    - shm
    - recycled_materials
    - seismic
    - edge_iot
    - ml_dl
    - signal
    - crypto
    - digital_twin
    - codes

# ─── Notes ───────────────────────────────────────────────────────────────────
notes: >
  Operational domain. OpenSeesPy backend is fully wired to SSOT.
  Arduino emulator provides hardware-in-the-loop without physical boards.
  PEER adapter supports AT2 format. Cross-validation (A vs B) available.
