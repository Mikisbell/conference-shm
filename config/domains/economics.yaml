# Domain Registry — Economics & Social Sciences
# Loaded by: domains/base.py → DomainBackend.load_registry("economics")
# SSOT keys: config/params.yaml → project.domain = "economics"
#
# Research areas: econometrics, time-series forecasting, causal inference,
# urban economics, development economics, policy analysis.

domain: economics
display_name: "Economics & Quantitative Social Sciences"
status: planned

solver:
  engine: statsmodels       # statsmodels + linearmodels for econometrics
  version_check: "python3 -c \"import statsmodels; print(statsmodels.__version__)\""
  install_cmd: "pip install statsmodels linearmodels fredapi pandas-datareader"
  backend_module: "domains.economics"
  backend_class: "EconomicsBackend"
  optional_engines:
    - name: linearmodels
      install: "pip install linearmodels"
      purpose: panel data, IV estimation, GMM
    - name: pymc
      install: "pip install pymc"
      purpose: Bayesian econometrics
    - name: causalml
      install: "pip install causalml"
      purpose: causal inference, heterogeneous treatment effects

dependencies:
  python:
    - numpy>=1.24
    - scipy>=1.10
    - matplotlib>=3.7
    - pandas>=2.0
    - pyyaml>=6.0
    - statsmodels>=0.14
    - scikit-learn>=1.3
  optional:
    - linearmodels>=5.3
    - fredapi>=0.5          # FRED macroeconomic data
    - pandas-datareader>=0.10  # World Bank, OECD, Yahoo Finance
    - pymc>=5.0
    - causalml>=0.14

data_sources:
  macro:
    name: FRED (Federal Reserve Economic Data)
    url: https://fred.stlouisfed.org
    requires_account: true  # free API key
    env_var: FRED_API_KEY
    local_path: data/external/fred/
    format: JSON / CSV
    adapter: fred
  world_development:
    name: World Bank Open Data
    url: https://data.worldbank.org
    requires_account: false
    local_path: data/external/worldbank/
    format: CSV
    adapter: rest_json
  microdata:
    name: IPUMS (census / survey microdata)
    url: https://ipums.org
    requires_account: true
    local_path: data/external/ipums/
    format: CSV / STATA
    adapter: rest_csv

apis:
  openalex:
    env_var: OPENALEX_API_KEY
    purpose: novelty check, style calibration
    required: false
    demo_value: ""
  semantic_scholar:
    env_var: SEMANTIC_SCHOLAR_API_KEY
    purpose: citation analysis
    required: false
    demo_value: ""
  fred:
    env_var: FRED_API_KEY
    purpose: macroeconomic time series download
    required: false
    demo_value: ""

compute:
  mode: experiment
  c0_check: "python3 -c \"import statsmodels, numpy, pandas; print('ECON deps OK')\""
  c1_gate: "TODO: tools/fetch_economic_data.py --verify"
  c2_runner: "domains/economics.py → EconomicsBackend.run_compute()"
  c3_emulator: null
  c4_synthetic: "TODO: tools/generate_econ_synthetic.py"
  c5_manifest: "python3 tools/generate_compute_manifest.py"
  stats_tool: "python3 tools/compute_statistics.py"

emulator:
  tool: null
  modes: {}
  hardware_migration: "N/A — domain uses panel/time-series datasets"

params_namespace:
  - economics.model.*        # estimator, n_lags, instrument_vars
  - economics.data.*         # start_year, end_year, frequency, country_codes
  - economics.thresholds.*   # significance_level, min_obs, power

pipeline:
  narrator_flag: "--domain economics"
  plot_figures_flag: "--domain economics"
  normative_codes:
    - AEA RCT Registry (randomized trials)
    - CONSORT (reporting randomized studies)
  minimum_quartile_for_field_data: Q3

  # ── Narrator sections (IMRaD adapted for economics/social science) ────────
  narrator_sections:
    - id: abstract
      title: "Abstract"
      template: >
        This paper examines {research_question} using {dataset} ({n_obs} observations,
        {start_year}–{end_year}). Employing {estimator}, we find that {treatment}
        {effect_direction} {outcome} by {effect_size} {units} (p={p_value}, 95% CI [{ci_low}, {ci_high}]).
        Results are robust to {robustness_checks}.
    - id: introduction
      title: "Introduction"
      template: >
        {stylized_fact}. Despite extensive literature on {existing_literature},
        the causal effect of {treatment} on {outcome} remains unclear due to {identification_challenge}.
        This paper addresses the gap using {identification_strategy} as a natural experiment.
    - id: data_and_variables
      title: "Data and Variables"
      template: >
        Data: {dataset_name} from {source} ({start_year}–{end_year}, {temporal_resolution}).
        Unit of observation: {unit}. Outcome: {outcome_description}. Treatment: {treatment_description}.
        Controls: {controls_list}. Sample restrictions: {sample_restrictions}.
        Descriptive statistics: Table 1.
    - id: methodology
      title: "Empirical Strategy"
      template: >
        Baseline specification: {outcome_it} = α + β·{treatment_it} + γ·{controls} + {fe} + ε_{it}.
        Identification: {identification_strategy} ({instrument_or_design}).
        Estimator: {estimator} with {se_type} standard errors.
        Threats to identification: {threats}. Robustness: {robustness_list}.
    - id: results
      title: "Results"
      template: >
        Table 2 reports the main estimates. {treatment} {effect_direction} {outcome}
        by {effect_size} {units} (β={beta}, SE={se}, p={p_value}).
        The effect is economically meaningful: {economic_magnitude_interpretation}.
        Heterogeneity analysis (Table 3): {heterogeneity_finding}.
    - id: discussion
      title: "Discussion"
      template: >
        These findings are consistent with {mechanism_explanation}.
        Compared to {prior_literature}, our estimates are {comparison_to_prior}.
        External validity: {external_validity_discussion}.
        Policy implications: {policy_recommendation}.

  # ── Figures ───────────────────────────────────────────────────────────────
  figures:
    - id: fig_01_data_overview
      type: timeseries
      title: "Trends in {outcome} and {treatment} ({start_year}–{end_year})"
      data_source: data/processed/panel_data.csv
      required: true
    - id: fig_02_event_study
      type: event_study_plot
      title: "Event Study: {treatment} Effect on {outcome}"
      data_source: data/processed/event_study.csv
      required: true
    - id: fig_03_heterogeneity
      type: coefficient_plot
      title: "Heterogeneous Treatment Effects by {group_variable}"
      data_source: data/processed/heterogeneity.csv
      required: true
    - id: fig_04_robustness
      type: robustness_chart
      title: "Robustness to Alternative Specifications"
      data_source: data/processed/robustness_results.csv
      required: true
    - id: fig_05_benchmark_comparison
      type: benchmark_comparison
      title: "Comparison with Published Estimates"
      data_source: data/processed/benchmark_comparison.csv
      required: false  # required for Q3+

  # ── Statistical tests ─────────────────────────────────────────────────────
  statistics:
    - ols_regression      # baseline OLS with clustered SE
    - iv_2sls             # instrumental variables (if applicable)
    - hausman_test        # endogeneity test for IV justification
    - wald_test           # joint significance of coefficients
    - bootstrap_ci_95     # 95% CI for main estimates

  # ── Bibliography categories ───────────────────────────────────────────────
  bib_categories:
    - econometrics_methods
    - labor_economics
    - development_economics
    - policy_evaluation
    - causal_inference
    - panel_data
    - statistics_econometric

todo:
  - tools/fetch_economic_data.py
  - tools/generate_econ_synthetic.py
  - config/params.yaml → add economics.* section
  - scientific_narrator.py → add DOMAIN_SECTIONS["economics"]
  - plot_figures.py → add domain="economics" figure set

notes: >
  Planned domain. Econometric pipeline (OLS, IV, panel data, diff-in-diff)
  is the primary compute path. No physical solver. FRED + World Bank
  provide free public datasets. First paper target: policy evaluation
  or time-series forecasting (Conference/Q4).
