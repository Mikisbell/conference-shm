# Domain Registry — Biomedical Engineering
# Loaded by: domains/base.py → DomainBackend.load_registry("biomedical")
# SSOT keys: config/params.yaml → project.domain = "biomedical"
#
# Research areas: biosignal processing (ECG/EEG/EMG), medical image analysis,
# wearable sensors, clinical data mining, biomechanics.

domain: biomedical
display_name: "Biomedical Engineering & Health Informatics"
status: planned

solver:
  engine: scipy_signal      # scipy.signal + MNE for biosignals
  version_check: "python3 -c \"import scipy; print(scipy.__version__)\""
  install_cmd: "pip install scipy mne scikit-learn neurokit2"
  backend_module: "domains.biomedical"
  backend_class: "BiomedicalBackend"
  optional_engines:
    - name: mne
      install: "pip install mne"
      purpose: EEG/MEG signal processing
    - name: neurokit2
      install: "pip install neurokit2"
      purpose: physiological signal analysis (HRV, ECG features)
    - name: pydicom
      install: "pip install pydicom"
      purpose: DICOM medical image I/O

dependencies:
  python:
    - numpy>=1.24
    - scipy>=1.10
    - matplotlib>=3.7
    - pandas>=2.0
    - pyyaml>=6.0
    - scikit-learn>=1.3
  optional:
    - mne>=1.5
    - neurokit2>=0.2
    - pydicom>=2.4
    - antropy>=0.1        # entropy features for biosignals

data_sources:
  public_ecg:
    name: PhysioNet (MIT-BIH, PTB-XL)
    url: https://physionet.org
    requires_account: false
    local_path: data/external/physionet/
    format: WFDB / CSV
  eeg:
    name: OpenNeuro
    url: https://openneuro.org
    requires_account: false
    local_path: data/external/openneuro/
    format: BIDS / EDF

apis:
  openalex:
    env_var: OPENALEX_API_KEY
    purpose: novelty check, style calibration
    required: false
    demo_value: ""
  semantic_scholar:
    env_var: SEMANTIC_SCHOLAR_API_KEY
    purpose: citation analysis
    required: false
    demo_value: ""

compute:
  mode: experiment
  c0_check: "python3 -c \"import scipy, numpy, pandas; print('BIO deps OK')\""
  c1_gate: "TODO: tools/fetch_biosignal_data.py --verify"
  c2_runner: "domains/biomedical.py → BiomedicalBackend.run_compute()"
  c3_emulator: null
  c4_synthetic: "TODO: tools/generate_bio_synthetic.py"
  c5_manifest: "python3 tools/generate_compute_manifest.py"
  stats_tool: "python3 tools/compute_statistics.py"

emulator:
  tool: null
  modes: {}
  hardware_migration: "N/A — use wearable devices via serial/BLE for real data"

params_namespace:
  - biomedical.signal.*      # fs, window_size, overlap, filter_type
  - biomedical.subject.*     # age_range, n_subjects, condition
  - biomedical.model.*       # classifier, n_features, cv_folds

pipeline:
  narrator_flag: "--domain biomedical"
  plot_figures_flag: "--domain biomedical"
  normative_codes:
    - IEC 60601-1 (medical electrical equipment)
    - ISO 13485 (medical devices QMS)
    - IEEE Std 11073 (health informatics)
  minimum_quartile_for_field_data: Q3

  # ── Narrator sections (IMRaD for biomedical/clinical papers) ─────────────
  narrator_sections:
    - id: abstract
      title: "Abstract"
      template: >
        Background: {clinical_problem}. Methods: {n_subjects} subjects ({condition_a} vs {condition_b})
        were analyzed using {signal_type} at {fs} Hz. {features} features extracted,
        classified by {classifier} (CV={cv_folds}-fold). Results: AUC={auc} (95% CI {ci_low}–{ci_high}),
        sensitivity={sensitivity}, specificity={specificity}. Conclusion: {key_finding}.
    - id: introduction
      title: "Introduction"
      template: >
        {clinical_problem} affects {prevalence} worldwide. Current gold-standard diagnostics
        rely on {gold_standard}, which requires {limitation}. Non-invasive {signal_type}
        analysis offers a promising alternative. This work addresses the gap in {gap}.
    - id: study_population
      title: "Study Population and Data"
      template: >
        Dataset: {dataset_name} ({n_subjects} subjects, {condition_a}: n={n_a}, {condition_b}: n={n_b}).
        Ethics: {ethics_approval}. Signal: {signal_type} at {fs} Hz, {n_channels} channels,
        epoch length {epoch_s} s. Exclusion criteria: {exclusion}.
    - id: methodology
      title: "Methodology"
      template: >
        Preprocessing: bandpass filter {f_low}–{f_high} Hz, notch {f_notch} Hz, baseline correction.
        Feature extraction: {features} ({feature_description}).
        Classification: {classifier} with {cv_folds}-fold cross-validation, stratified by subject.
        Statistical test: Mann-Whitney U (AUC comparison), DeLong test (ROC difference).
    - id: results
      title: "Results"
      template: >
        The proposed pipeline achieved AUC={auc} ± {auc_std} ({cv_folds}-fold CV).
        Sensitivity={sensitivity}, specificity={specificity}, F1={f1}.
        Top features: {top_features}. Mann-Whitney U p={p_value} vs baseline {baseline_auc}.
    - id: discussion
      title: "Discussion"
      template: >
        The {auc} AUC exceeds prior work on {dataset_name} ({prior_auc}, {prior_ref}).
        Clinical interpretation: {clinical_interpretation}.
        Limitations: {limitations}. Future: {future_work} on prospective cohort.

  # ── Figures ───────────────────────────────────────────────────────────────
  figures:
    - id: fig_01_pipeline
      type: pipeline_diagram
      title: "Signal Processing and Classification Pipeline"
      data_source: config/params.yaml
      required: true
    - id: fig_02_signal_examples
      type: signal_comparison
      title: "Representative {signal_type} Epochs ({condition_a} vs {condition_b})"
      data_source: data/processed/signal_examples.csv
      required: true
    - id: fig_03_feature_distribution
      type: boxplot_comparison
      title: "Feature Distribution by Group"
      data_source: data/processed/features.csv
      required: true
    - id: fig_04_roc_curve
      type: roc_curve
      title: "ROC Curve (AUC={auc}, 95% CI)"
      data_source: data/processed/roc_data.csv
      required: true
    - id: fig_05_benchmark_comparison
      type: benchmark_comparison
      title: "Comparison with Published Methods"
      data_source: data/processed/benchmark_comparison.csv
      required: false  # required for Q3+

  # ── Statistical tests ─────────────────────────────────────────────────────
  statistics:
    - mann_whitney_u      # AUC comparison (nonparametric)
    - delong_test         # ROC curve comparison
    - bootstrap_ci_95     # 95% CI for AUC and metrics
    - mcnemar_test        # paired sensitivity/specificity comparison (Q1/Q2)
    - cohens_kappa        # inter-rater agreement if applicable

  # ── Bibliography categories ───────────────────────────────────────────────
  bib_categories:
    - biosignal_processing
    - machine_learning_clinical
    - wearable_sensors
    - clinical_validation
    - digital_health
    - feature_extraction
    - statistics_clinical

todo:
  - tools/fetch_biosignal_data.py
  - tools/generate_bio_synthetic.py
  - config/params.yaml → add biomedical.* section
  - scientific_narrator.py → add DOMAIN_SECTIONS["biomedical"]
  - plot_figures.py → add domain="biomedical" figure set

notes: >
  Planned domain. Biosignal processing pipeline (ECG/EEG feature extraction,
  ML classification) is the primary compute path. No physical FEM solver.
  PhysioNet provides free public datasets for Conference/Q4 papers.
