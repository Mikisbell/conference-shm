# Domain Registry — Environmental Engineering
# Loaded by: domains/base.py → DomainBackend.load_registry("environmental")
# SSOT keys: config/params.yaml → project.domain = "environmental"
#
# Research areas: urban forestry, air quality, water bodies, soil degradation,
# biodiversity monitoring, remote sensing, ecosystem services.

domain: environmental
display_name: "Environmental Engineering & Ecology"
status: planned  # operational | planned | experimental

# ─── Solver ──────────────────────────────────────────────────────────────────
solver:
  engine: scipy_stats      # Primary: scipy + statsmodels for environmental stats
  version_check: "python3 -c \"import scipy; print(scipy.__version__)\""
  install_cmd: "pip install scipy statsmodels geopandas rasterio"
  backend_module: "domains.environmental"
  backend_class: "EnvironmentalBackend"
  optional_engines:
    - name: geemap          # Google Earth Engine Python API
      install: "pip install geemap"
      purpose: satellite imagery, NDVI, land cover
    - name: rasterio
      install: "pip install rasterio"
      purpose: raster GIS analysis
    - name: geopandas
      install: "pip install geopandas"
      purpose: vector GIS, spatial joins
    - name: pysal
      install: "pip install pysal"
      purpose: spatial autocorrelation, Moran's I

# ─── Python dependencies ─────────────────────────────────────────────────────
dependencies:
  python:
    - numpy>=1.24
    - scipy>=1.10
    - matplotlib>=3.7
    - pandas>=2.0
    - pyyaml>=6.0
    - statsmodels>=0.14
    - scikit-learn>=1.3
  optional:
    - geopandas>=0.14         # spatial analysis
    - rasterio>=1.3           # raster data
    - geemap>=0.28            # Google Earth Engine
    - pysal>=23.0             # spatial econometrics
    - netCDF4>=1.6            # climate model outputs
    - xarray>=2023.0          # N-D labeled arrays (ERA5, CMIP6)
  system:
    - gdal                    # required by geopandas/rasterio on Linux

# ─── External data sources ───────────────────────────────────────────────────
data_sources:
  remote_sensing:
    name: Google Earth Engine / Copernicus
    url: https://earthengine.google.com
    requires_account: true
    local_path: data/external/remote_sensing/
    format: GeoTIFF / NetCDF
    adapter: nasa_earthdata
  climate:
    name: ERA5 Reanalysis (ECMWF)
    url: https://cds.climate.copernicus.eu
    requires_account: true
    local_path: data/external/era5/
    format: NetCDF
    adapter: rest_json
  air_quality:
    name: OpenAQ
    url: https://openaq.org
    requires_account: false
    local_path: data/external/air_quality/
    format: JSON / CSV
    adapter: rest_json
  species_occurrence:
    name: GBIF (Global Biodiversity Information Facility)
    url: https://www.gbif.org
    requires_account: false
    local_path: data/external/gbif/
    format: CSV / Darwin Core
    adapter: rest_csv

# ─── APIs used ───────────────────────────────────────────────────────────────
apis:
  openalex:
    env_var: OPENALEX_API_KEY
    purpose: novelty check, style calibration
    required: false
    demo_value: ""
  semantic_scholar:
    env_var: SEMANTIC_SCHOLAR_API_KEY
    purpose: citation analysis, style calibration
    required: false
    demo_value: ""
  earth_engine:
    env_var: GEE_SERVICE_ACCOUNT_KEY
    purpose: satellite imagery analysis via Google Earth Engine
    required: false
    demo_value: ""
  openaq:
    env_var: ""  # public API, no key required
    purpose: air quality station data
    required: false
    demo_value: ""

# ─── Compute pipeline ────────────────────────────────────────────────────────
compute:
  mode: experiment           # simulation | experiment | hybrid
  c0_check: "python3 -c \"import scipy, numpy, pandas; print('ENV deps OK')\""
  c1_gate: "TODO: tools/fetch_environmental_data.py --verify"
  c2_runner: "domains/environmental.py → EnvironmentalBackend.run_compute()"
  c3_emulator: null          # no hardware emulator for this domain
  c4_synthetic: "TODO: tools/generate_env_synthetic.py"
  c5_manifest: "python3 tools/generate_compute_manifest.py"
  stats_tool: "python3 tools/compute_statistics.py"

# ─── Emulator modes ──────────────────────────────────────────────────────────
emulator:
  tool: null
  modes: {}
  hardware_migration: "N/A — environmental domain uses field sensors / satellite APIs"

# ─── SSOT params namespace ───────────────────────────────────────────────────
# When project.domain = "environmental", add these to config/params.yaml:
params_namespace:
  - environmental.study_area.*     # bbox, CRS, resolution
  - environmental.time_series.*    # start_date, end_date, temporal_resolution
  - environmental.targets.*        # NDVI thresholds, AQI limits, species min_count
  - environmental.model.*          # regression type, spatial_autocorrelation_test

# ─── Paper pipeline hooks ────────────────────────────────────────────────────
pipeline:
  narrator_flag: "--domain environmental"
  plot_figures_flag: "--domain environmental"
  normative_codes:
    - EPA NAAQS
    - EU Air Quality Directive 2008/50/EC
    - IPBES frameworks
    - ISO 14064 (GHG accounting)
  minimum_quartile_for_field_data: Q3

  # ── Narrator sections (IMRaD for environmental papers) ────────────────────
  narrator_sections:
    - id: abstract
      title: "Abstract"
      template: >
        This study investigates {indicator} in {study_area} over the period {start_date}–{end_date}.
        Using {data_source} and {method}, we quantify {key_finding}.
        Results reveal a statistically significant {trend_direction} trend
        (Mann-Kendall τ={tau}, p={p_value}) with spatial autocorrelation (Moran's I={moran_i}).
        These findings have implications for {policy_relevance}.
    - id: introduction
      title: "Introduction"
      template: >
        {indicator} monitoring in {study_area_type} is essential for {rationale}.
        Existing studies have focused on {existing_focus}, leaving a gap in {gap}.
        This work contributes {contribution} using {data_source} at {resolution} resolution.
    - id: study_area_and_data
      title: "Study Area and Data"
      template: >
        The study area covers {bbox_description} (CRS: {crs}, {resolution_m} m resolution).
        Data: {data_sources_list} spanning {start_date}–{end_date} ({temporal_resolution} resolution).
        Preprocessing: {preprocessing_steps}. Quality control: {qc_criteria}.
    - id: methodology
      title: "Methodology"
      template: >
        {indicator} was computed as {formula_description}.
        Temporal trend analysis: Mann-Kendall test (Sen's slope estimator).
        Spatial analysis: Moran's I (queen contiguity weights, significance α=0.05).
        Regression: {regression_type} with predictors {predictors}.
    - id: results
      title: "Results"
      template: >
        {indicator} showed a {trend_direction} trend over {n_years} years
        (Sen's slope = {sens_slope} {units}/year, p={p_value}).
        Spatial clustering: Moran's I = {moran_i} (p={moran_p}), indicating {clustering_description}.
        {regression_type} model: R²={r2}, significant predictors: {significant_predictors}.
    - id: discussion
      title: "Discussion"
      template: >
        The observed {trend_direction} trend in {indicator} is consistent with {literature_context}.
        Spatial hotspots in {hotspot_areas} suggest {interpretation}.
        Limitations: {limitations}. Policy implications: {policy_recommendations}.

  # ── Figures (generated by plot_figures.py --domain environmental) ─────────
  figures:
    - id: fig_01_study_area
      type: map
      title: "Study Area and Monitoring Stations"
      data_source: data/processed/study_area.csv
      required: true
    - id: fig_02_timeseries
      type: timeseries
      title: "Temporal Trend of {indicator}"
      data_source: data/processed/indicator_timeseries.csv
      required: true
    - id: fig_03_spatial_distribution
      type: spatial_heatmap
      title: "Spatial Distribution of {indicator}"
      data_source: data/processed/spatial_indicators.csv
      required: true
    - id: fig_04_model_results
      type: regression_coefficients
      title: "Regression Model Coefficients (95% CI)"
      data_source: data/processed/model_results.csv
      required: true
    - id: fig_05_benchmark_comparison
      type: benchmark_comparison
      title: "Model Validation vs Field Observations"
      data_source: data/processed/benchmark_comparison.csv
      required: false  # required for Q3+

  # ── Statistical tests (run by compute_statistics.py --domain environmental)
  statistics:
    - mann_kendall        # nonparametric temporal trend (H₀: no trend)
    - sens_slope          # magnitude of trend (units/year)
    - moran_i             # spatial autocorrelation (queen contiguity)
    - pearson_r           # bivariate correlation between indicators
    - ols_regression      # linear model with predictors

  # ── Bibliography categories ───────────────────────────────────────────────
  bib_categories:
    - remote_sensing
    - gis_spatial
    - environmental_monitoring
    - air_quality
    - biodiversity
    - climate_change
    - statistics_spatial
    - policy_environment

