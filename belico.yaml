# belico.yaml - Orquestador Maestro del Stack Bélico (Arquitectura Pura)
# Versión 2.0 (Marzo 2026) - Base Cero

project_metadata:
  name: "Investigacion_Base"
  author: "Ing. Mateo"
  status: "init"

# 1. Configuración de Memoria (Engram)
memory:
  path: ".agent/memory/core"
  auto_commit: true
  hashing_algorithm: "sha256"

# 2. Configuración de Equipos y Agentes (Agent Teams Lite)
teams:
  path: ".agent/teams/core"
  active_roles:
    - "guardian"
    - "narrator"

# 3. Auditoría Física y Lógica (Guardian Angel)
security:
  guardian_path: ".agent/security/guardian"
  strict_mode: true
  required_checks:
    - "syntax_validation"
    - "physics_guardrails"

# 4. Habilidades e Inteligencia (Skills)
skills:
  gentleman_path: ".agent/skills/gentleman"
  aitmpl_path: ".agent/skills/aitmpl"
  active_modules:
    - "clean_architecture"
    - "scientific_research_writer"

# 5. Rutas Operativas (Lienzo en Blanco)
workspace:
  src: "src/"
  drafts: "articles/drafts/"
  tools: "tools/"
