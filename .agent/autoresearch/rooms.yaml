# AutoResearch Rooms Configuration
# Each room defines: what to improve, how to measure, what's sacred

rooms:
  validator:
    name: "Submission Validator"
    description: "Improve validate_submission.py detection accuracy"
    editable:
      - tools/validate_submission.py
    sacred:
      - tests/fixtures/  # NEVER modify test papers
      - tools/autoresearch.py  # NEVER modify the conductor
    metric: "precision_recall"
    evaluation:
      command: "python3 tests/test_validate_submission.py --score"
      timeout_seconds: 120
      score_key: "composite_score"  # higher = better
    baseline_score: 0.3333  # 2026-03-09: spec bug crashes all papers
    max_consecutive_failures: 5
    priority: 1  # highest priority (most measurable)

  prompts:
    name: "Sub-Agent Prompts"
    description: "Improve sub-agent prompt clarity and effectiveness"
    editable:
      - .agent/prompts/verifier.md
      - .agent/prompts/physical_critic.md
      - .agent/prompts/bibliography_agent.md
      - .agent/prompts/figure_agent.md
      - .agent/prompts/reviewer_simulator.md
    sacred:
      - tests/fixtures/
      - tools/autoresearch.py
    metric: "prompt_compliance"
    evaluation:
      command: "python3 tests/test_prompt_quality.py --score"
      timeout_seconds: 180
      score_key: "compliance_score"
    baseline_score: 0.78  # 2026-03-09: weakest=figure_agent, weakest_signal=ssot_refs
    max_consecutive_failures: 5
    priority: 2

  skills:
    name: "Skills Documentation"
    description: "Improve skill clarity and completeness"
    editable:
      - .agent/skills/paper_production.md
      - .agent/skills/signal_processing.md
      - .agent/skills/literature_review.md
      - .agent/skills/cfd_domain.md
      - .agent/skills/wind_domain.md
      - .agent/skills/norms_codes.md
    sacred:
      - tests/fixtures/
      - tools/autoresearch.py
      - CLAUDE.md  # skills should not contradict CLAUDE.md
    metric: "skill_coverage"
    evaluation:
      command: "python3 tests/test_skill_quality.py --score"
      timeout_seconds: 120
      score_key: "coverage_score"
    baseline_score: 0.5986  # 2026-03-09: weakest=signal_processing, weakest_dim=structure
    max_consecutive_failures: 5
    priority: 3

  simulation:
    name: "Simulation Code"
    description: "Improve numerical accuracy and robustness"
    editable:
      - src/physics/torture_chamber.py
      - src/physics/spectral_engine.py
      - src/physics/cross_validation.py
    sacred:
      - tests/fixtures/
      - config/params.yaml
      - tools/autoresearch.py
    metric: "numerical_accuracy"
    evaluation:
      command: "python3 tests/test_simulation.py --score"
      timeout_seconds: 300
      score_key: "accuracy_score"
    baseline_score: 0.6085  # 2026-03-09: weakest=cross_validation, weakest_dim=error_handling
    max_consecutive_failures: 3
    priority: 4

  quartile_gates:
    name: "Quartile Quality Gates"
    description: "Improve per-quartile validation (Conference/Q4/Q3/Q2/Q1 specs enforcement)"
    editable:
      - tools/validate_submission.py
      - .agent/specs/journal_specs.yaml
    sacred:
      - tests/fixtures/
      - tools/autoresearch.py
    metric: "quartile_accuracy"
    evaluation:
      command: "python3 tests/test_quartile_gates.py --score"
      timeout_seconds: 120
      score_key: "composite_score"
    baseline_score: 0.40  # 2026-03-10: spec bug crashes all, 0 quartile checks pass
    max_consecutive_failures: 5
    priority: 5

  tool_chain:
    name: "Tool Chain Connectivity"
    description: "Improve import chain, SSOT propagation, CLI interfaces, data flow"
    editable:
      - tools/validate_submission.py
      - tools/generate_params.py
      - tools/check_novelty.py
      - articles/scientific_narrator.py
      - src/physics/spectral_engine.py
      - src/physics/cross_validation.py
    sacred:
      - tests/fixtures/
      - config/params.yaml
      - tools/autoresearch.py
    metric: "chain_connectivity"
    evaluation:
      command: "python3 tests/test_tool_chain.py --score"
      timeout_seconds: 120
      score_key: "chain_score"
    baseline_score: 0.94  # 2026-03-10: 2 CLI help failures (validate_submission, arduino_emu)
    max_consecutive_failures: 5
    priority: 6

# Global settings
settings:
  model: "claude-sonnet-4-20250514"  # Anthropic fallback
  github_model: "openai/gpt-4o"  # GitHub Models (free with Education)
  max_experiments_per_run: 10
  experiment_timeout_seconds: 600  # 10 min max per experiment
  results_file: ".agent/autoresearch/results.tsv"
  branch_prefix: "autoresearch"
  prefer_deletions: true  # Karpathy principle: simpler = better
  min_improvement_threshold: 0.001  # minimum score delta to keep
