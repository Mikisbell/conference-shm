  description: "Entry-level journal (Infrastructures MDPI, Sensors MDPI, Vibration MDPI)"
  word_count:
    min: 3000
    max: 12000
    source: "MDPI recommendation"
  references:
    min: 15
    max: 40
  figures:
    min: 3
    max: 8
  tables:
    min: 1
    max: 5
  abstract:
    max_words: 200
    source: "MDPI standard"
  keywords:
    min: 3
    max: 10
  required_sections:
    - Abstract
    - Introduction
    - Methodology
    - Results
    - Conclusion
  # validate_submission.py uses required_sections by default. Use mdpi_required_sections when targeting MDPI journals (Sensors, Buildings, Materials)
  mdpi_required_sections:
    - Abstract
    - Introduction
    - Materials and Methods
    - Results
    - Discussion
    - Conclusions
    - "Data Availability Statement"
    - "Author Contributions"
    - "Conflicts of Interest"
  data_requirements:
    - "synthetic_data acceptable with validation"
  normative_framework:
    # LAW: Local codes fully acceptable. Just state which code you used.
    required: 0
    codes: []
    primary:
      - "Any applicable code (E.030, Eurocode 8, ASCE 7, local codes)"
    local_codes_role: "fully_valid"
    local_codes_note: >
      Q4 journals accept local code frameworks without international
      comparison. Simply state 'designed per E.030 (Peru seismic code)'.
      Adding a brief equivalence note strengthens the paper but is optional.
    minimum_international_codes: 0
  novelty_gate: false
  comparison_methods: 0
  review_rounds_expected: 1
  typical_journals:
    - name: "Infrastructures"
      publisher: MDPI
      format: mdpi
      page_limit: "no strict limit"
      word_limit: "recommend 3000-12000"
      abstract_limit: 200
      reference_style: numbered
      IF: 2.7
      layout:
        submission: "single column"
        published: "single column + sidebar"
    - name: "Sensors"
      publisher: MDPI
      format: mdpi
      page_limit: "no strict limit"
      word_limit: "recommend 3000-12000"
      abstract_limit: 200
      reference_style: numbered
      IF: 3.4
      layout:
        submission: "single column"
        published: "single column + sidebar"
    - name: "Vibration"
      publisher: MDPI
      format: mdpi
      page_limit: "no strict limit"
      word_limit: "recommend 3000-12000"
      abstract_limit: 200
      reference_style: numbered
      IF: 1.9
      layout:
        submission: "single column"
        published: "single column + sidebar"

conference:
  description: "Conference paper (EWSHM, IMAC, ASCE Structures Congress, WCEE)"
  word_count:
    min: 2500
    max: 5000
    source: "EWSHM 2026 template (8 pages) + IMAC/ASCE typical"
  page_limit: 8
  page_format: "A4, Times 11pt, margins 2.5cm top / 2cm bottom / 2.7cm sides"
  references:
    min: 10
    max: 30
  figures:
    min: 3
    max: 6
  tables:
    min: 1
    max: 3
  abstract:
    max_words: 500
    source: "EWSHM 2026 call for papers"
    notes:
      ewshm: "max 500 words + 1 image allowed"
      imac: "250 words (extended abstract 2-3 pages)"
      asce_congress: "~150 words"
      wcee: "2500 characters (~400 words)"
  required_sections:
    - Abstract
    - Introduc
    - Metodolog
    - Result
    - Conclus
  data_requirements:
    - "synthetic_data with physics-based justification"
  normative_framework:
    # LAW: Conferences welcome local case studies. Any code is valid.
    required: 0
    codes: []
    primary:
      - "Any applicable code"
    local_codes_role: "fully_valid"
    local_codes_note: >
      Conference papers are ideal for presenting local case studies.
      'SHM framework validated against E.030 seismic demands in Peru'
      is a perfectly valid framing. WCEE especially welcomes regional work.
    minimum_international_codes: 0
  novelty_gate: false
  comparison_methods: 0
  review_rounds_expected: 1
  typical_venues:
    - name: "EWSHM"
      full_name: "European Workshop on Structural Health Monitoring"
      year: 2026
      location: "Toulouse, France"
      page_limit: 8
      page_format: "A4, single column"
      layout: "single column (submission = published)"
      font: "Times 11pt"
      margins: "top 2.5cm, bottom 2.0cm, left 2.7cm, right 2.7cm"
      min_image_dpi: 200
      abstract_limit: 500
      abstract_allows_image: true
      deadline_abstract: "2025-11-01"
      deadline_full: "2026-04-01"
      proceedings: "Springer / Lecture Notes in Civil Engineering"
    - name: "IMAC"
      full_name: "International Modal Analysis Conference"
      year: 2026
      location: "Palm Springs, CA"
      page_limit: 20
      extended_abstract_pages: "2-3"
      font: "10pt"
      abstract_limit: 250
      layout: "single column (submission = published)"
      proceedings: "Springer / Conference Proceedings of SEM"
    - name: "ASCE Structures Congress"
      page_limit: 12
      page_format: "US Letter, 12pt, 1 inch margins"
      abstract_limit: 150
      layout: "single column (submission = published)"
      proceedings: "ASCE Library"
      note: "headings NOT numbered"
    - name: "WCEE"
      full_name: "World Conference on Earthquake Engineering"
      page_limit: 12
      abstract_limit_chars: 2500
      layout: "single column (submission = published)"
      proceedings: "IAEE"
      next_edition: "19WCEE 2028 Montreal"
