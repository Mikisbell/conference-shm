# .agent/specs/journal_specs.yaml — Quality Gates per Quartile/Venue
# ====================================================================
# TDD for papers: these specs define PASS/FAIL criteria BEFORE writing.
# validate_submission.py reads this file to enforce quartile-specific gates.
# A paper that doesn't meet its spec is BLOCKED from compilation.
#
# SOURCES (verified 2026-03-06, deep research):
#   - ASCE: 30 double-spaced pages / ~10,000 words, 150-175 word abstract,
#           author-date references (NOT numbered), max 100 char title
#   - MDPI (Sensors, Buildings, etc.): no strict limit, recommend 3,000-12,000 words,
#           200 word abstract, numbered refs, Data Availability + Author Contributions required
#   - Elsevier (Eng. Structures): 30 pages max (double-spaced, 12pt), 250 word abstract
#   - Elsevier (SDEE, Structures): no explicit word limit (flexible), 250 word abstract
#   - Wiley (EESD): 22 pages max single-spaced, 250 word abstract, max 6 keywords
#   - SAGE (SHM): no explicit word limit, min 5 keywords, SAGE Vancouver refs (superscript)
#   - Springer (JCSHM): no explicit limit, 150-250 word abstract, REJECTS purely numerical
#   - Hindawi/Wiley (SCHM): 300 word abstract, fully open access
#   - EWSHM 2026: 8 pages A4, Times 11pt, margins 2.5/2.0/2.7/2.7 cm, 500 word abstract
#   - IMAC/SEM: extended abstract 2-3 pages, full paper 10-20 pages (Springer)
#   - ASCE Structures Congress: 10-12 pages, US Letter, 12pt, headings NOT numbered
#   - WCEE: ~10-12 pages, 2500 chars abstract, next 19WCEE 2028 Montreal
#
# NOTE: Most top journals do NOT specify hard word limits. The ranges below
# are PRACTICAL GUIDELINES based on analysis of published papers in each
# quartile, NOT hard journal rules. They serve as quality gates to prevent
# under-developed or bloated manuscripts.

Q1:
  description: "Top-tier journal (Engineering Structures, EESD, SDEE, Structural Safety, IJDRR)"
  word_count:
    min: 6000
    max: 10000
    source: "analysis of published papers + ASCE explicit limit"
  page_limits:
    engineering_structures: "30 pages double-spaced, 12pt font"
    eesd: "22 pages single-spaced"
    sdee: "no explicit limit; Technical Notes max 4 journal pages"
    structural_safety: "no explicit limit"
    asce: "30 pages double-spaced (~10,000 words)"
  references:
    min: 40
    max: 120
    source: "typical range for Q1 civil engineering papers"
  figures:
    min: 6
    max: 15
  tables:
    min: 2
    max: 10
  abstract:
    max_words: 250
    source: "Elsevier/Wiley/ASCE: max 150-250 words"
  keywords:
    min: 3
    max: 7
    source: "EESD max 6, SDEE 1-7, Eng. Structures 4-8"
  # Some Q1 journals merge Literature Review into Introduction — adjust per target journal
  required_sections:
    - Abstract
    - Introduction
    - Literature Review
    - Methodology
    - Results
    - Discussion
    - Conclusion
    - Data Availability
  data_requirements:
    - "field_data OR lab_data (real measurements mandatory)"
    - "min 2 structures or test specimens"
    - "statistical significance (p < 0.05 or CI reported)"
  normative_framework:
    # LAW: Reviewers are international. Local codes alone = reject.
    required: 2
    codes:
      - "Eurocode 8"
      - "ASCE 7"
      - "ACI 318"
      - "fib Model Code"
      - "ISO 13822"
    primary:
      - "Eurocode 8 (seismic design spectrum, damping correction)"
      - "ASCE 7-22 (loads, SDS/SD1, site amplification)"
      - "ACI 318-19 (concrete design, capacity factors)"
    secondary:
      - "fib Model Code 2010 (material models, creep, shrinkage)"
      - "ISO 13822 (structural assessment)"
    local_codes_role: "case_study_only"
    local_codes_note: >
      E.030 (Peru), NTC (Mexico), NCh433 (Chile), etc. may be CITED as
      the local regulatory context for the case study, but the paper MUST
      frame methodology and validation against international codes.
      A Q1 paper using ONLY E.030 will be rejected as 'too local'.
    minimum_international_codes: 2
  novelty_gate: true
  comparison_methods: 2
  review_rounds_expected: 2-3
  typical_journals:
    - name: "Engineering Structures"
      publisher: Elsevier
      format: elsarticle
      page_limit: "30 pages double-spaced"
      word_limit: "no hard limit (~7000-9000 typical)"
      abstract_limit: 250
      reference_style: numbered
      keywords: "4-8"
      IF: 5.5
      layout:
        submission: "single column"
        published: "two column"
      article_types:
        - "Research Article"
        - "Review Article"
        - "Short Communication"
    - name: "Earthquake Engineering & Structural Dynamics"
      publisher: Wiley
      format: wiley
      page_limit: "22 pages single-spaced"
      word_limit: "no hard limit (~6000-8000 typical)"
      abstract_limit: 250
      reference_style: numbered
      keywords: "max 6"
      IF: 4.5
      layout:
        submission: "single column"
        published: "single column"
      article_types:
        - "Research Article"
        - "Short Communication"
    - name: "Soil Dynamics and Earthquake Engineering"
      publisher: Elsevier
      format: elsarticle
      page_limit: "no explicit limit"
      word_limit: "no hard limit (~6000-9000 typical)"
      abstract_limit: 250
      reference_style: numbered
      keywords: "1-7"
      IF: 4.2
      layout:
        submission: "single column"
        published: "two column"
      article_types:
        - "Research Article"
        - "Technical Note (max 4 journal pages)"
    - name: "Structural Safety"
      publisher: Elsevier
      format: elsarticle
      page_limit: "no explicit limit"
      word_limit: "no hard limit"
      abstract_limit: 250
      reference_style: numbered
      keywords: "4-8"
      IF: 5.8
      layout:
        submission: "single column"
        published: "two column"
    - name: "International Journal of Disaster Risk Reduction"
      publisher: Elsevier
      format: elsarticle
      page_limit: "no explicit limit"
      word_limit: "no hard limit"
      abstract_limit: 250
      reference_style: numbered
      keywords: "1-7"
      IF: 4.5
      layout:
        submission: "single column"
        published: "two column"
      note: "multidisciplinary (seismic risk, SHM, resilience); APC desde sept 2025"

Q2:
  description: "Strong journal (SHM SAGE, ASCE J.Struct.Eng., Structures, SCHM)"
  word_count:
    min: 5000
    max: 10000
    source: "ASCE explicit max 10,000 words + typical published range"
  page_limits:
    asce: "30 pages double-spaced (~10,000 words)"
    sage_shm: "no explicit limit"
    structures: "20 pages double-spaced"
    schm: "no explicit limit"
  references:
    min: 30
    max: 80
  figures:
    min: 5
    max: 12
  tables:
    min: 2
    max: 8
  abstract:
    max_words: 250
    notes:
      asce: "150-175 words"
      sage_shm: "250 words"
      structures: "250 words"
      schm: "300 words"
  keywords:
    min: 3
    max: 10
    notes:
      asce: "max 100 character title"
      sage_shm: "min 5 keywords"
      structures: "max 10 keywords"
  required_sections:
    - Abstract
    - Introduction
    - Methodology
    - Results
    - Discussion
    - Conclusion
  data_requirements:
    - "field_data OR lab_data OR validated_synthetic"
    - "min 1 structure or test specimen"
  normative_framework:
    # LAW: At least 1 international code required alongside local code.
    required: 1
    codes:
      - "Eurocode 8"
      - "ASCE 7"
      - "ACI 318"
      - "fib Model Code"
      - "ISO 13822"
    primary:
      - "Eurocode 8 OR ASCE 7-22 (seismic/loads)"
      - "ACI 318-19 OR fib Model Code (concrete)"
    local_codes_role: "regional_context"
    local_codes_note: >
      E.030, NTC, NCh433, etc. can appear as the design code for the
      studied structure, but validation must reference at least 1
      international standard for the methodology to be generalizable.
    minimum_international_codes: 1
  novelty_gate: true
  comparison_methods: 1
  review_rounds_expected: 1-2
  typical_journals:
    - name: "Structural Health Monitoring"
      publisher: SAGE
      format: sage
      page_limit: "no explicit limit"
      word_limit: "no hard limit"
      abstract_limit: 250
      reference_style: "SAGE Vancouver (superscript numbered)"
      keywords: "min 5"
      IF: 5.7
      layout:
        submission: "single column"
        published: "two column"
    - name: "Journal of Structural Engineering"
      publisher: ASCE
      format: asce
      page_limit: "30 pages double-spaced"
      word_limit: "10,000 words max"
      abstract_limit: 175
      reference_style: "author-date (NOT numbered)"
      keywords: "standard"
      title_max_chars: 100
      IF: 3.9
      layout:
        submission: "single column, double-spaced"
        published: "two column"
      note: "headings NOT numbered in ASCE format"
    - name: "Structures"
      publisher: Elsevier
      format: elsarticle
      page_limit: "20 pages double-spaced"
      word_limit: "no hard limit"
      abstract_limit: 250
      reference_style: numbered
      keywords: "max 10"
      IF: 3.9
      layout:
        submission: "single column"
        published: "two column"
      note: "'Your Paper Your Way' policy — flexible formatting on first submission"
    - name: "Structural Control and Health Monitoring"
      publisher: "Hindawi/Wiley"
      format: hindawi
      page_limit: "no explicit limit"
      word_limit: "no hard limit"
      abstract_limit: 300
      reference_style: numbered
      IF: 4.8
      layout:
        submission: "single column"
        published: "single column"
      note: "fully open access"

Q3:
  description: "Solid journal (JCSHM Springer, Buildings MDPI, Applied Sciences MDPI)"
  word_count:
    min: 4000
    max: 12000
    source: "MDPI recommendation + typical published range"
  references:
    min: 25
    max: 60
  figures:
    min: 4
    max: 10
  tables:
    min: 2
    max: 6
  abstract:
    max_words: 250
    notes:
      jcshm: "150-250 words"
      mdpi: "200 words"
  keywords:
    min: 3
    max: 10
  required_sections:
    - Abstract
    - Introduction
    - Methodology
    - Results
    - Discussion
    - Conclusion
  # validate_submission.py uses required_sections by default. Use mdpi_required_sections when targeting MDPI journals (Sensors, Buildings, Materials)
  mdpi_required_sections:
    - Abstract
    - Introduction
    - Materials and Methods
    - Results
    - Discussion
    - Conclusions
    - "Data Availability Statement"
    - "Author Contributions"
    - "Conflicts of Interest"
  data_requirements:
    - "field_data OR validated_synthetic"
  normative_framework:
    # LAW: International context recommended but local codes acceptable as primary.
    required: 0
    codes: []
    recommended:
      - "Eurocode 8"
      - "ASCE 7"
    primary:
      - "Eurocode 8 OR ASCE 7-22 OR local seismic code"
    local_codes_role: "acceptable_as_primary"
    local_codes_note: >
      Q3 journals (especially MDPI) accept regionally-focused papers.
      E.030 can be the primary code IF the paper contextualizes it:
      'E.030 specifies ζ=5%, analogous to Eurocode 8 clause 3.2.2.2'.
      At least mention the international equivalent.
    minimum_international_codes: 0
    recommended_international_codes: 1
  novelty_gate: false
  comparison_methods: 1
  review_rounds_expected: 1-2
  typical_journals:
    - name: "Journal of Civil Structural Health Monitoring"
      publisher: Springer
      format: springer
      page_limit: "no explicit limit"
      word_limit: "no hard limit"
      abstract_limit: 250
      reference_style: numbered
      IF: 3.6
      layout:
        submission: "single column"
        published: "single column"
      note: "REJECTS purely numerical papers — needs field or lab data"
    - name: "Buildings"
      publisher: MDPI
      format: mdpi
      page_limit: "no strict limit"
      word_limit: "recommend 3000-12000"
      abstract_limit: 200
      reference_style: numbered
      IF: 3.1
      layout:
        submission: "single column"
        published: "single column + sidebar"
      note: "Data Availability Statement + Author Contributions mandatory"
    - name: "Applied Sciences"
      publisher: MDPI
      format: mdpi
      page_limit: "no strict limit"
      word_limit: "recommend 3000-12000"
      abstract_limit: 200
      reference_style: numbered
      IF: 2.5
      layout:
        submission: "single column"
        published: "single column + sidebar"
      note: "Data Availability Statement + Author Contributions mandatory"

