# PEER NGA-West2 Record Downloader
# ===================================
# Downloads seismic .AT2 records on-demand and commits them to the repo.
# Triggered manually via GitHub UI (Actions tab → Download Records → Run workflow).
#
# Setup:
#   Go to: Settings → Secrets and variables → Actions → New repository secret
#   Add: PEER_EMAIL and PEER_PASSWORD

name: Download Seismic Records (PEER NGA-West2)

on:
  workflow_dispatch:
    inputs:
      rsn_list:
        description: "RSN numbers to download (space-separated, e.g.: 766 1158 4517)"
        required: true
        default: "766"
      out_dir:
        description: "Output directory (relative to repo root)"
        required: false
        default: "db/excitation/records"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Debug PEER page structure
        env:
          PEER_EMAIL: ${{ secrets.PEER_EMAIL }}
          PEER_PASSWORD: ${{ secrets.PEER_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, tempfile, subprocess, urllib.parse
          from pathlib import Path
          sys.path.insert(0, '.')
          from tools.peer_downloader import PeerSession, load_credentials, PEER_BASE, _curl

          email, pw = load_credentials()
          s = PeerSession(email, pw, verbose=True)
          if not s.login():
              print("Login failed"); sys.exit(0)

          debug_dir = Path('/tmp/peer_debug')
          debug_dir.mkdir(exist_ok=True)

          # Try multiple potential endpoints to find where AT2 files come from
          endpoints = [
              "/ngawest2/search?search[search_record_sequence_number]=4517&search[source_db_flag]=1",
              "/ngawest2/flatfile?sourceDb_flag=1&rsn=4517",
              "/spectras/new?sourceDb_flag=1&rsn=4517",
              "/ngawest2/search",
          ]
          for ep in endpoints:
              url = PEER_BASE + ep
              code, html = s._get(url)
              fname = debug_dir / (re.sub(r'[^a-z0-9]', '_', ep)[:60] + '.html')
              fname.write_text(html or '')
              at2 = re.findall(r'[Aa][Tt]2|download|\.zip', html or '')
              print(f"\n=== {ep[:60]} ===")
              print(f"  HTTP {code}, {len(html or '')} chars, AT2/dl mentions: {len(at2)}")
              # Print interesting links
              for m in re.findall(r'href=["\']([^"\']{5,80})["\']', html or '')[:8]:
                  if any(k in m.lower() for k in ['download','at2','record','ngaw','zip']):
                      print(f"  LINK: {m}")
              # Print script src (JS endpoints)
              for m in re.findall(r'(?:url|path|href)\s*[:=]\s*["\']([^"\']{5,60})["\']', html or '')[:5]:
                  if any(k in m.lower() for k in ['api','record','ngaw','at2','download']):
                      print(f"  API:  {m}")
          print("\nDebug HTML saved to /tmp/peer_debug/")
          PYEOF

      - name: Upload debug HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: peer-debug-html
          path: /tmp/peer_debug/

      - name: Download records from PEER NGA-West2
        env:
          PEER_EMAIL: ${{ secrets.PEER_EMAIL }}
          PEER_PASSWORD: ${{ secrets.PEER_PASSWORD }}
        run: |
          mkdir -p ${{ inputs.out_dir }}
          python3 tools/peer_downloader.py \
            --rsn ${{ inputs.rsn_list }} \
            --out ${{ inputs.out_dir }}

      - name: Commit downloaded records
        run: |
          git config user.name "Records Bot"
          git config user.email "records-bot@users.noreply.github.com"
          git add ${{ inputs.out_dir }}/*.AT2 2>/dev/null || true
          if git status --porcelain | grep -q .; then
            RSN_LIST="${{ inputs.rsn_list }}"
            git commit -m "data: add seismic records RSN ${RSN_LIST// /, RSN }"
            git push origin main
            echo "Records committed and pushed."
          else
            echo "No new records to commit (may already exist)."
          fi
