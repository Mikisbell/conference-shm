# PEER NGA-West2 Record Downloader
# ===================================
# Downloads seismic .AT2 records on-demand and commits them to the repo.
# Triggered manually via GitHub UI (Actions tab → Download Records → Run workflow).
#
# Strategy:
#   1. curl login (avoids bot detection on login page)
#   2. Playwright + cookie injection (navigates React SPA, intercepts download URLs)
#
# Setup:
#   Go to: Settings → Secrets and variables → Actions → New repository secret
#   Add: PEER_EMAIL and PEER_PASSWORD

name: Download Seismic Records (PEER NGA-West2)

on:
  workflow_dispatch:
    inputs:
      rsn_list:
        description: "RSN numbers to download (space-separated, e.g.: 766 1158 4517)"
        required: true
        default: "766"
      out_dir:
        description: "Output directory (relative to repo root)"
        required: false
        default: "db/excitation/records"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-dotenv playwright playwright-stealth
          playwright install chromium firefox --with-deps

      - name: Download records via Playwright (curl login + cookie injection)
        env:
          PEER_EMAIL: ${{ secrets.PEER_EMAIL }}
          PEER_PASSWORD: ${{ secrets.PEER_PASSWORD }}
        run: |
          mkdir -p ${{ inputs.out_dir }}
          # peer_playwright.py: if no --cookie-jar, does curl login internally then injects cookies
          # Exit 0 even on PEER unavailability so the commit step can report "no new records"
          python3 tools/peer_playwright.py \
            --rsn ${{ inputs.rsn_list }} \
            --out ${{ inputs.out_dir }} || {
              echo "::warning::PEER NGA-West2 download failed (server may be rate-limiting this IP)."
              echo "::warning::Wait a few hours and re-run the workflow from a fresh runner."
              exit 0
            }

      - name: Commit downloaded records
        run: |
          git config user.name "Records Bot"
          git config user.email "records-bot@users.noreply.github.com"
          # -f (force) necesario: db/excitation/records/.gitignore bloquea *.AT2 en la madre
          # Los hijos heredan el .gitignore pero el workflow debe poder commitear los registros descargados
          git add -f ${{ inputs.out_dir }}/*.AT2 2>/dev/null || true
          if git status --porcelain | grep -q .; then
            RSN_LIST="${{ inputs.rsn_list }}"
            git commit -m "data: add seismic records RSN ${RSN_LIST// /, RSN }"
            git push origin main
            echo "Records committed and pushed."
          else
            echo "No new records to commit (may already exist)."
          fi
