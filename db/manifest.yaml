# db/manifest.yaml — Data Traceability Manifest
# ===============================================
# Domain-agnostic: each domain uses this file to declare traceability
# claims → data → sources for any paper.
#
# structural:    RSN records, PEER NGA-West2
# environmental: ERA5, OpenAQ, GEE, GBIF, field samples
# biomedical:    PhysioNet datasets, clinical records
# economics:     FRED series, World Bank indicators
# any new domain: add claims using the same structure below
#
# -----------------------------------------------
# PLANTILLA VACÍA (madre)
# Este archivo es el SSOT de trazabilidad del paper activo.
# La madre lo mantiene vacío como plantilla.
# Cada proyecto hijo lo llena con sus propios datos al iniciar EXPLORE.
#
# Flujo:
#   1. Al hacer PROPOSE: completar paper_id, domain, quartile
#   2. En COMPUTE C1: llenar excitation.records_needed + records_present
#   3. En IMPLEMENT: llenar traceability (claim → figura → archivo → fuente)
#   4. En ARCHIVE: status de todos los records = complete
#
# Herramienta: python3 tools/validate_submission.py --suggest-trace

paper_id: ''
domain: ''            # TODO: structural | water | air (set to your project domain)
quartile: ''          # conference | Q4 | Q3 | Q2 | Q1

excitation:
  # type controls which data gate applies:
  #   seismic          → PEER NGA-West2 records required (ngawest2.berkeley.edu)
  #   laboratory       → lab load/displacement data required (db/calibration/)
  #   acoustic_emission→ AE sensor data required (db/field/ or db/calibration/)
  #   cyclic_loading   → quasi-static cyclic test data required
  #   field            → field measurement campaign required
  #   none             → no excitation (static analysis only)
  type: seismic
  source: ''
  flatfile: ''
  selection_criteria:
    magnitude_Mw: []
    distance_Rjb_km: []
    Vs30_ms: []
    mechanism: ''
    target_spectrum: CMS
  records_needed: []
  records_present: []
  status: pending
  last_updated: ''

benchmarks:
  - name: ''
    source: ''
    role: ''
    local_path: ''
    status: pending

calibration:
  - name: ''
    source: ''
    role: ''
    local_path: ''
    status: pending

validation:
  - name: ''
    protocol: articles/field_data_campaign.md
    min_duration_min: 30
    local_path: ''
    status: pending

traceability: []
